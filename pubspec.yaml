name: signspeak
description: "Urdu Sign Language Detection App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  camera: ^0.10.5
  
  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.3
  
  # State management
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  google_sign_in: ^6.2.2
  
  # UI
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  
  # Navigation
  go_router: ^14.2.8
  
  # Permissions
  permission_handler: ^11.3.1

  # ✅ TFLITE PLUGIN (Choose one)
  tflite_flutter: ^0.10.4  # RECOMMENDED
  image: ^4.1.3            # For preprocessing

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/models/  # Add this for your .tflite models